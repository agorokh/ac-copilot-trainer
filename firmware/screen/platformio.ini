; PlatformIO config for the AC Copilot rig screen (Guition JC3248W535).
;
; Board identity confirmed 2026-04-21:
;   ESP32-S3-N16R8, 16 MB flash, 8 MB octal PSRAM, VID 0x303A / PID 0x1001, COM6.
;   Display: AXS15231B QSPI, 3.5" 480x320 IPS.
;   Touch:   CST820 or AXS5106 over I2C (TBD on first boot).
;
; See docs/01_Vault/AcCopilotTrainer/01_Decisions/screen-firmware-toolchain.md
; and docs/01_Vault/AcCopilotTrainer/10_Rig/esp32-jc3248w535-screen-v1.md.

[platformio]
default_envs = jc3248w535

[env:jc3248w535]
platform       = espressif32@^6.8.0
framework      = arduino
board          = esp32-s3-devkitc-1

; ESP32-S3-N16R8: 16 MB QIO flash, 8 MB octal PSRAM
board_build.mcu              = esp32s3
board_build.arduino.memory_type = qio_opi
board_build.flash_mode       = qio
board_build.psram_type       = opi
board_build.flash_size       = 16MB
board_upload.flash_size      = 16MB
board_build.partitions       = default_16MB.csv

; Windows cmd.exe has an 8191-char cmdline limit. LovyanGFX + LVGL + deep
; project paths easily blow past that (observed 25094 chars). Force SCons
; to use @response-files for CC/CXX/LINK/AR.
extra_scripts =
    pre:tools/long_cmd_fix.py
    post:tools/long_cmd_fix_post.py

; Native USB CDC on the S3 (no external UART bridge on this board).
; ARDUINO_USB_MODE=1 + CDC_ON_BOOT=1 means Serial == USB CDC == COM6.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -I include
    -I secrets

; Graphics: Arduino_GFX (moononournation) — the installed LovyanGFX 1.2.20 has
; no Panel_AXS15231B class, and the JC3248W535 panel is AXS15231B-over-QSPI.
; Arduino_GFX ships a known-good Arduino_AXS15231B driver used by the JC32...
; community. LVGL intentionally NOT a dep in Phase 1 (brought back Phase 2).
; ArduinoWebsockets (gilmaimon) is the chosen WS client.
lib_deps =
    ; Arduino_GFX 1.5.x+ pulls esp32-hal-periman.h which only exists in ESP32
    ; Arduino core 3.x. platform=espressif32@6.13.0 ships Arduino core 2.0.17,
    ; so pin to the last 1.4.x release that still compiles against core 2.x.
    moononournation/GFX Library for Arduino @ 1.4.7
    gilmaimon/ArduinoWebsockets @ ^0.5.3
    bblanchon/ArduinoJson @ ^7.0.4

; COM port for upload + monitor. Override with --upload-port if Windows renumbers.
upload_speed  = 921600
upload_port   = COM6
monitor_speed = 115200
monitor_port  = COM6
monitor_filters = esp32_exception_decoder, time
