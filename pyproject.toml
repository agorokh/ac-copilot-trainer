[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "project-template"
version = "0.1.0"
description = "Replace with your project description"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
dependencies = []

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "bandit>=1.7",
  "ruff>=0.8",
  "pre-commit>=4.0",
]
mining = [
  "requests>=2.31.0",
  "scikit-learn>=1.3.0",
  "numpy>=1.24.0",
]
knowledge = [
  "mcp>=1.2.0",
]

[tool.setuptools.packages.find]
where = ["src", "."]
include = ["project_template*", "tools*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.coverage.run]
source = ["src/project_template", "tools"]
omit = [
  "tools/process_miner/run.py",
  "tools/repo_knowledge/mcp_server.py",
]
