# Reference workflow for **child** repositories created from this template.
# Copy as-is or customize. Requires prior `copier copy <template-url> .` so `.copier-answers.yml`
# records the template source for `copier update`.
#
# Set repository variable `TEMPLATE_REF` (optional) to default tag/branch for scheduled runs
# (e.g. `template-2026.03` or `main`). `workflow_dispatch` can override via input.
# Ensure label `template-sync` exists (first run may create it via `gh label create`).

name: Template Sync

on:
  schedule:
    - cron: "0 10 * * 3" # Wednesday 10:00 UTC
  workflow_dispatch:
    inputs:
      template_ref:
        description: "Template tag or branch (Copier --vcs-ref)"
        type: string
        default: "main"
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Copier
        run: python -m pip install --upgrade pip "copier>=9.14.0,<10"

      - name: Resolve template ref
        id: ref
        shell: bash
        env:
          TEMPLATE_REF: ${{ vars.TEMPLATE_REF }}
          INPUT_TEMPLATE_REF: ${{ inputs.template_ref }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            printf '%s\n' "ref=${INPUT_TEMPLATE_REF}" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "ref=${TEMPLATE_REF:-main}" >> "$GITHUB_OUTPUT"
          fi

      - name: Copier update
        env:
          VCS_REF: ${{ steps.ref.outputs.ref }}
        run: copier update --trust --defaults --vcs-ref "$VCS_REF"

      - name: Ensure template-sync label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh label list --json name --jq '.[].name' | grep -qx 'template-sync'; then
            echo "Label template-sync already exists."
          else
            gh label create template-sync --color BFD4F2 --description "Automated template sync PRs"
          fi

      - name: Create sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VCS_REF: ${{ steps.ref.outputs.ref }}
        shell: bash
        run: |
          set -euo pipefail
          # Include untracked files (git diff alone misses new files from the template).
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes after copier update."
            exit 0
          fi
          BRANCH="template-sync/$(date -u +%Y%m%d-%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          COMMIT_MSG=$(mktemp)
          printf 'chore: sync with template (%s)\n' "$VCS_REF" > "$COMMIT_MSG"
          git commit -F "$COMMIT_MSG"
          rm -f "$COMMIT_MSG"
          git push -u origin "$BRANCH"
          BODY_FILE=$(mktemp)
          {
            echo "Auto-generated by Copier from template ref \`$VCS_REF\`. Review carefully: domain-specific files protected by \`_skip_if_exists\` may still need manual merge."
          } > "$BODY_FILE"
          gh pr create \
            --title "chore: template sync $(date -u +%Y-%m-%d)" \
            --body-file "$BODY_FILE" \
            --label template-sync
          rm -f "$BODY_FILE"
