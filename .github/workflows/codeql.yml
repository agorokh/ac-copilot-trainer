name: CodeQL

on:
  schedule:
    - cron: "17 4 * * 2" # Tuesday 04:17 UTC
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended

      - uses: github/codeql-action/analyze@v4
