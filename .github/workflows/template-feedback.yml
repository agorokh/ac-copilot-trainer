# Reference workflow for **child** repositories. When CI fails on the default branch, checks for a
# recently merged PR labeled `template-sync` and opens an issue on the upstream template repo.
#
# Configure:
# - Repository variable `TEMPLATE_UPSTREAM_REPO` (e.g. `agorokh/template-repo`) — example only;
#   point at your org’s canonical template.
# - Secret `TEMPLATE_REPO_TOKEN`: PAT or fine-grained token with **issues: write** on the upstream
#   template repository (minimal scope; see MAINTAINING_THE_TEMPLATE.md).
#
# `workflow_run.workflows` must match the **name:** field of your CI workflow exactly (this
# template uses `name: CI` in `.github/workflows/ci.yml`).

name: Template Feedback

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  check-correlation:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v6

      - name: Check for recent template sync merges
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          SYNC_JSON=$(gh pr list --state merged --label template-sync \
            --json number,title,mergedAt \
            -L 50 \
            --jq '[.[] | select((.mergedAt | fromdateiso8601) > (now - 604800))]')
          COUNT=$(echo "$SYNC_JSON" | jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "correlated=true" >> "$GITHUB_OUTPUT"
            DELIM="SYNC_BODY_EOF_$(uuidgen | tr -d '-')"
            {
              echo "sync_body<<${DELIM}"
              echo "$SYNC_JSON" | jq -r '.[] | "- #\(.number) \(.title) (merged \(.mergedAt))"'
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "correlated=false" >> "$GITHUB_OUTPUT"
            echo "sync_body=" >> "$GITHUB_OUTPUT"
          fi

      - name: File upstream issue
        if: steps.check.outputs.correlated == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_REPO_TOKEN }}
          UPSTREAM: ${{ vars.TEMPLATE_UPSTREAM_REPO }}
          # PR titles/lines from the API must not be expanded into the shell script body.
          SYNC_BODY: ${{ steps.check.outputs.sync_body }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "TEMPLATE_REPO_TOKEN not set; skipping upstream issue."
            exit 0
          fi
          REPO="${UPSTREAM:-}"
          if [ -z "$REPO" ]; then
            echo "TEMPLATE_UPSTREAM_REPO not set; skipping upstream issue."
            exit 0
          fi
          TITLE="feedback: CI failure in ${{ github.repository }} after template sync"
          BODY_FILE=$(mktemp)
          {
            echo "Child repo: ${{ github.repository }}"
            echo "Failed workflow: ${{ github.event.workflow_run.html_url }}"
            echo ""
            echo "Recent merged template-sync PRs (last 7 days):"
            printf '%s\n' "$SYNC_BODY"
            echo ""
            echo "Auto-generated by template-feedback workflow."
          } > "$BODY_FILE"
          WF_URL="${{ github.event.workflow_run.html_url }}"
          # gh --jq does not forward jq --arg; pipe JSON to jq (cli/cli#10263).
          EXISTS=$(gh issue list --repo "$REPO" --label feedback --state open --limit 100 \
            --json body | jq --arg url "$WF_URL" '[.[] | select(.body | contains($url))] | length')
          if [ "${EXISTS:-0}" != "0" ]; then
            echo "Upstream issue already references this workflow run; skipping create."
            rm -f "$BODY_FILE"
            exit 0
          fi
          gh issue create --repo "$REPO" \
            --title "$TITLE" \
            --body-file "$BODY_FILE" \
            --label feedback \
            --label template-sync
          rm -f "$BODY_FILE"
