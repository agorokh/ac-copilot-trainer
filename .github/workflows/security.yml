name: Security

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - pyproject.toml
      - .github/workflows/security.yml

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mining,knowledge]" pip-audit

      # pip 26.0.1 (bundled on the GHA runner): CVE-2026-3219 — no fix version published yet.
      # Ignored here because the vulnerability is in the installer itself, not a project dependency;
      # revisit when a fixed pip is released and remove the --ignore-vuln flag.
      - name: Run pip-audit
        run: pip-audit --ignore-vuln CVE-2026-3219
