name: Security

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - pyproject.toml
      - .github/workflows/security.yml

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mining,knowledge]" pip-audit

      - name: Run pip-audit
        run: pip-audit
