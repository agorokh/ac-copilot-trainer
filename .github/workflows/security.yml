name: Security

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - pyproject.toml
      - .github/workflows/security.yml

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pip-audit

      # Pygments 2.19.2 (transitive via dev tools): CVE-2026-4539 — no fixed wheel on PyPI yet. Tracking removal: https://github.com/agorokh/template-repo/issues/6
      - name: Run pip-audit
        run: pip-audit --ignore-vuln CVE-2026-4539
