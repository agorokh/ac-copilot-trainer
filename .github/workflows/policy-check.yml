name: Policy (Canonical Docs)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canonical-docs:
    name: Canonical docs exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Emit policy report
        run: |
          echo '{"canonical_docs":{"AGENTS.md":'"$(test -f AGENTS.md && echo true || echo false)"',"CLAUDE.md":'"$(test -f CLAUDE.md && echo true || echo false)"',".cursorrules":'"$(test -f .cursorrules && echo true || echo false)"',"AGENT_CORE_PRINCIPLES.md":'"$(test -f AGENT_CORE_PRINCIPLES.md && echo true || echo false)"'}}' | tee policy_report.json

      - name: Verify canonical policy docs exist
        run: |
          missing=0
          for f in AGENTS.md CLAUDE.md AGENT_CORE_PRINCIPLES.md .cursorrules; do
            if [[ ! -f "$f" ]]; then
              echo "::error::Missing $f"
              missing=1
            fi
          done
          exit "$missing"
