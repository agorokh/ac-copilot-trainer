name: Policy (Canonical Docs)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canonical-docs:
    name: Canonical docs exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify canonical policy docs (script is source of truth)
        run: bash scripts/check_policy_docs.sh
