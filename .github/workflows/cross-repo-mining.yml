# Cross-repo process miner aggregation (template maintainers). Optional `MINING_REPOS` / token.
# Set repository variable `CROSS_REPO_MINING_REPOS` to a comma-separated `owner/repo` list.

name: Cross-Repo Mining

on:
  schedule:
    - cron: "0 10 1 * *" # 1st of each month, 10:00 UTC
  workflow_dispatch:
    inputs:
      repos:
        description: "Comma-separated owner/repo list (overrides variable when non-empty)"
        type: string
        default: ""
        required: false
      days:
        description: "Lookback days (string so 0 is not treated as falsy by Actions)"
        type: string
        default: "30"
        required: false

permissions:
  contents: read
  pull-requests: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project + miner deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mining]"

      - name: Run cross-repo aggregate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINING_REPOS: ${{ inputs.repos || vars.CROSS_REPO_MINING_REPOS }}
          MINING_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.days || '30' }}
        run: python scripts/cross_repo_aggregate.py

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-repo-mining-summary
          path: reports/cross_repo_mining/aggregate_summary.json
          if-no-files-found: ignore
