name: Vault auto-merge

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: vault-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  disable-automerge-on-vault-unlabel:
    if: >-
      github.event.action == 'unlabeled' &&
      github.event.label.name == 'vault-only' &&
      github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Disable auto-merge when vault-only label is removed
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR_NUMBER" --repo "$REPO" --disable-auto || true

  guard-and-automerge:
    if: contains(github.event.pull_request.labels.*.name, 'vault-only') && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Validate vault-only scope
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          files="$(gh api --paginate "repos/${REPO}/pulls/${PR_NUMBER}/files" --jq '.[].filename')"
          if [[ -z "$files" ]]; then
            gh pr merge "$PR_NUMBER" --repo "$REPO" --disable-auto || true
            echo "error: vault-only PR has no changed files" >&2
            exit 1
          fi
          out_of_scope="$(printf '%s\n' "$files" | grep -Ev '^docs/01_Vault/' || true)"
          if [[ -n "$out_of_scope" ]]; then
            gh pr merge "$PR_NUMBER" --repo "$REPO" --disable-auto || true
            echo "error: vault-only PR contains out-of-scope files:" >&2
            printf '%s\n' "$out_of_scope" | sed 's/^/  - /' >&2
            exit 1
          fi
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --auto --delete-branch
