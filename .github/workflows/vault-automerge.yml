name: Vault auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  guard-and-automerge:
    if: contains(github.event.pull_request.labels.*.name, 'vault-only')
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Validate vault-only scope
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          files="$(gh pr diff "$PR_NUMBER" --repo "$REPO" --name-only)"
          if [[ -z "$files" ]]; then
            echo "error: vault-only PR has no changed files" >&2
            exit 1
          fi
          out_of_scope="$(printf '%s\n' "$files" | grep -Ev '^docs/01_Vault/' || true)"
          if [[ -n "$out_of_scope" ]]; then
            echo "error: vault-only PR contains out-of-scope files:" >&2
            printf '%s\n' "$out_of_scope" | sed 's/^/  - /' >&2
            exit 1
          fi
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --auto --delete-branch
